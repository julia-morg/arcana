- name: Deploy Arcana
  hosts: all
  become: true

  vars:
    work_dir: "/home/{{ ansible_user }}/arcana"
    letsencrypt_cert_name: "juliamorg.com"
    letsencrypt_primary_domain: "juliamorg.com"
    letsencrypt_extra_domain: "arcana.juliamorg.com"
    letsencrypt_email: "admin@juliamorg.com"

  tasks:
    - name: Ensure base directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: "ubuntu"
        group: "ubuntu"
      loop:
        - "{{ work_dir }}"
        - "{{ work_dir }}/nginx"
        - "{{ work_dir }}/certbot"
        - "{{ work_dir }}/certbot/conf"
        - "{{ work_dir }}/certbot/www"
        - "{{ work_dir }}/arcana"

    - name: Ensure www-data directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
        owner: "www-data"
        group: "www-data"
      loop:
        - "{{ work_dir }}/arcana/storage"
        - "{{ work_dir }}/arcana/storage/app"
        - "{{ work_dir }}/arcana/storage/app/public"
        - "{{ work_dir }}/arcana/storage/app/public/memes"
        - "{{ work_dir }}/arcana/storage/logs"
        - "{{ work_dir }}/arcana/storage/framework"
        - "{{ work_dir }}/arcana/storage/framework/cache"
        - "{{ work_dir }}/arcana/storage/framework/sessions"
        - "{{ work_dir }}/arcana/storage/framework/views"

    - name: Stop services if compose file exists
      ansible.builtin.stat:
        path: "{{ work_dir }}/docker-compose.yaml"
      register: compose_file

    - name: Docker compose down (if exists)
      ansible.builtin.shell:
        cmd: "docker compose down"
        chdir: "{{ work_dir }}"
      when: compose_file.stat.exists

    - name: Render and copy config files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0644"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      loop:
        - { src: "{{ playbook_dir }}/../templates/env.tpl",             dest: "{{ work_dir }}/arcana/.env" }
        - { src: "{{ playbook_dir }}/../templates/nginx.conf",          dest: "{{ work_dir }}/nginx/nginx.conf" }
        - { src: "{{ playbook_dir }}/../templates/docker-compose.yaml", dest: "{{ work_dir }}/docker-compose.yaml" }

    - name: Sync project files to remote arcana directory
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ work_dir }}/arcana/"
        delete: yes
        recursive: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.idea"
          - "--exclude=node_modules"
          - "--exclude=vendor"
          - "--exclude=storage"
          - "--exclude=tests"
          - "--exclude=.env"
      delegate_to: localhost
      become: false

    - name: Docker compose up with build
      ansible.builtin.shell:
        cmd: "docker compose up --build -d"
        chdir: "{{ work_dir }}"

    - name: Obtain or renew LE cert with webroot (non-interactive)
      ansible.builtin.shell:
        cmd: >-
          docker compose run --rm --entrypoint "" certbot
          certbot certonly
          --webroot -w /var/www/certbot
          --cert-name {{ letsencrypt_cert_name }}
          -d {{ letsencrypt_primary_domain }}
          -d {{ letsencrypt_extra_domain }}
          --email {{ letsencrypt_email }}
          --agree-tos --no-eff-email --non-interactive
          --expand
          --keep-until-expiring
        chdir: "{{ work_dir }}"

    - name: Reload nginx after certificate operation
      ansible.builtin.shell:
        cmd: "docker compose exec -T nginx nginx -s reload"
        chdir: "{{ work_dir }}"
